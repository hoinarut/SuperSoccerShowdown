name: Build, Test, and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 22.x
  ARTIFACTS_DIR: artifacts
  WEB_DIR: src/web

permissions:
  contents: read

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MySolution.slnx

      - name: Test
        run: dotnet test MySolution.slnx --configuration Release --no-restore

      - name: Publish API for Lambda
        run: |
          dotnet publish src/MyApp.Api/MyApp.Api.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output "${{ env.ARTIFACTS_DIR }}/lambda"

      - name: Package Lambda zip
        run: |
          cd "${{ env.ARTIFACTS_DIR }}/lambda"
          zip -r ../api.zip .

      - name: Publish Worker for Lambda
        run: |
          dotnet publish src/MyApp.Worker/MyApp.Worker.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained false \
            --output "${{ env.ARTIFACTS_DIR }}/worker"

      - name: Package Worker zip
        run: |
          cd "${{ env.ARTIFACTS_DIR }}/worker"
          zip -r ../worker.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY || 'sss/terraform.tfstate' }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        working-directory: infra
        env:
          TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'sss' }}
          TF_VAR_environment: ${{ vars.ENVIRONMENT || 'dev' }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
          TF_VAR_database_connection_string: ${{ secrets.DATABASE_CONNECTION_STRING }}
          TF_VAR_lambda_deployment_package_path: ${{ github.workspace }}/${{ env.ARTIFACTS_DIR }}/api.zip
          TF_VAR_lambda_package_version: ${{ github.sha }}
          TF_VAR_worker_lambda_deployment_package_path: ${{ github.workspace }}/${{ env.ARTIFACTS_DIR }}/worker.zip
          TF_VAR_worker_lambda_package_version: ${{ github.sha }}
        run: terraform apply -auto-approve -input=false

      - name: Read Terraform outputs
        id: terraform
        working-directory: infra
        run: |
          echo "api_url=$(terraform output -raw api_gateway_url)" >> "$GITHUB_OUTPUT"
          echo "ui_bucket=$(terraform output -raw ui_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "ui_cloudfront_url=$(terraform output -raw ui_cloudfront_url)" >> "$GITHUB_OUTPUT"
          echo "ui_distribution_id=$(terraform output -raw ui_cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WEB_DIR }}/package-lock.json

      - name: Build Angular UI
        working-directory: ${{ env.WEB_DIR }}
        env:
          API_URL: ${{ steps.terraform.outputs.api_url }}
        run: |
          npm ci
          cat > src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            apiUrl: '${API_URL}',
          };
          EOF
          npm run build

      - name: Deploy UI to S3
        run: |
          aws s3 sync "${{ env.WEB_DIR }}/dist/web/browser/" "s3://${{ steps.terraform.outputs.ui_bucket }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.svg"

          aws s3 sync "${{ env.WEB_DIR }}/dist/web/browser/" "s3://${{ steps.terraform.outputs.ui_bucket }}/" \
            --cache-control "public,max-age=0,no-cache,no-store,must-revalidate" \
            --exclude "*" \
            --include "index.html" \
            --include "*.svg"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.terraform.outputs.ui_distribution_id }}" \
            --paths "/*"

      - name: Output deployment URLs
        run: |
          echo "API URL: ${{ steps.terraform.outputs.api_url }}"
          echo "UI URL: ${{ steps.terraform.outputs.ui_cloudfront_url }}"
